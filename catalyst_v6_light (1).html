// ── Drawing ───────────────────────────────────────────────────────
const NODE_W = 170;
const NODE_H = 54;

function edgePath(from, to) {
  const x1 = from.x + NODE_W / 2;
  const y1 = from.y + NODE_H;
  const x2 = to.x + NODE_W / 2;
  const y2 = to.y;
  const cp = Math.abs(y2 - y1) * 0.5;
  return `M ${x1} ${y1} C ${x1} ${y1 + cp}, ${x2} ${y2 - cp}, ${x2} ${y2}`;
}

// ── Graph View ────────────────────────────────────────────────────
function GraphView({ selected, setSelected }) {
  const [hovered, setHovered] = useState(null);
  const active = hovered || selected;
  const highlightedNodes = new Set();
  const highlightedEdges = new Set();
  if (active) {
    highlightedNodes.add(active);
    allEdges.forEach((e, i) => {
      if (e.from === active || e.to === active) {
        highlightedNodes.add(e.from);
        highlightedNodes.add(e.to);
        highlightedEdges.add(i);
      }
    });
  }
  const canvasW = 850;
  const canvasH = 1080;

  return (
    <div style={{ display: "flex", justifyContent: "center", paddingTop: "20px", paddingBottom: "40px" }}>
      <svg width={canvasW} height={canvasH} viewBox={`0 0 ${canvasW} ${canvasH}`} style={{ overflow: "visible" }}>
        <defs>
          <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
            <circle cx="16" cy="16" r="0.6" fill="#94a3b830" />
          </pattern>
          <filter id="glow"><feGaussianBlur stdDeviation="8" result="b" /><feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
          <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="5" orient="auto-start-reverse">
            <path d="M 0 0 L 10 3 L 0 6 z" fill="#334155" />
          </marker>
        </defs>
        <rect width={canvasW} height={canvasH} fill="url(#dots)" />

        {/* Phase bands — colored horizontal boxes */}
        {[
          { y: 40, h: 90, label: "DIAGNOSE", color: "#e11d48" },
          { y: 135, h: 220, label: "DEFINE", color: "#f97316" },
          { y: 360, h: 100, label: "AMBITION", color: "#22c55e" },
          { y: 475, h: 110, label: "DESIGN", color: "#eab308" },
          { y: 595, h: 110, label: "STRUCTURE", color: "#0ea5e9" },
          { y: 715, h: 90, label: "DEPLOY", color: "#3b82f6" },
          { y: 840, h: 100, label: "DELIVER", color: "#14b8a6" },
          { y: 955, h: 80, label: "GOVERN", color: "#6366f1" },
        ].map((p, i) => (
          <g key={i}>
            {/* Background band */}
            <rect x={0} y={p.y} width={canvasW} height={p.h} rx={0} fill={p.color + "0c"} />
            {/* Left accent bar */}
            <rect x={0} y={p.y} width={4} height={p.h} fill={p.color} opacity={0.6} rx={0} />
            {/* Top line */}
            <line x1={0} y1={p.y} x2={canvasW} y2={p.y} stroke={p.color + "25"} strokeWidth={1} />
            {/* Phase label */}
            <rect x={10} y={p.y + 6} width={80} height={18} rx={3} fill={p.color + "20"} />
            <text x={50} y={p.y + 18} textAnchor="middle" style={{ fontSize: "9px", fill: p.color, fontFamily: mono, letterSpacing: "0.12em", fontWeight: 700 }}>{p.label}</text>
          </g>
        ))}

        {/* Edges — always visible */}
        {allEdges.map((e, i) => {
          const from = nodes[e.from];
          const to = nodes[e.to];
          const isHigh = highlightedEdges.has(i);
          const hasActive = active !== null;
          return (
            <path
              key={i}
              d={edgePath(from, to)}
              fill="none"
              stroke={isHigh ? from.color : from.color + "50"}
              strokeWidth={isHigh ? 2.5 : 1.5}
              opacity={hasActive ? (isHigh ? 0.9 : 0.2) : 0.6}
              style={{ transition: "all 0.3s ease" }}
            />
          );
        })}

        {/* Animated particles on edges when hovered */}
        {active && allEdges.filter((e, i) => highlightedEdges.has(i)).map((e, i) => {
          const from = nodes[e.from];
          const to = nodes[e.to];
          const path = edgePath(from, to);
          return (
            <circle key={`p${i}`} r="2.5" fill={from.color} opacity={0.8}>
              <animateMotion dur="1.5s" repeatCount="indefinite" path={path} />
            </circle>
          );
        })}

        {/* Nodes */}
        {Object.values(nodes).map((n) => {
          const isSel = selected === n.id;
          const isHigh = highlightedNodes.has(n.id);
          const hasActive = active !== null;
          const op = hasActive ? (isHigh ? 1 : 0.2) : 1;

          return (
            <g
              key={n.id}
              onClick={(e) => { e.stopPropagation(); setSelected(isSel ? null : n.id); }}
              onMouseEnter={() => setHovered(n.id)}
              onMouseLeave={() => setHovered(null)}
              style={{ cursor: "pointer", transition: "opacity 0.3s" }}
              opacity={op}
            >
              {isSel && <rect x={n.x - 4} y={n.y - 4} width={NODE_W + 8} height={NODE_H + 8} rx={12} fill="none" stroke={n.color} strokeWidth={1.5} opacity={0.5} filter="url(#glow)" />}
              <rect x={n.x} y={n.y} width={NODE_W} height={NODE_H} rx={8} fill="#ffffff" stroke={isSel ? n.color : isHigh ? n.color + "60" : "#1e293b"} strokeWidth={isSel ? 2 : 1} />
              <rect x={n.x} y={n.y} width={4} height={NODE_H} rx={2} fill={n.color} opacity={0.9} />
              <text x={n.x + 20} y={n.y + 25} style={{ fontSize: "16px" }} textAnchor="middle">{n.emoji}</text>
              <text x={n.x + 34} y={n.y + 22} style={{ fontSize: "12px", fontWeight: 600, fill: "#0f172a", fontFamily: sans }}>{n.label}</text>
              <text x={n.x + 34} y={n.y + 38} style={{ fontSize: "9.5px", fill: "#64748b", fontFamily: mono }}>{n.summary}</text>
              <rect x={n.x + NODE_W - 30} y={n.y + 6} width={24} height={16} rx={4} fill={n.color + "20"} />
              <text x={n.x + NODE_W - 18} y={n.y + 17} textAnchor="middle" style={{ fontSize: "9px", fontWeight: 700, fill: n.color, fontFamily: mono }}>{n.records}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

                    <div style={{ width: "1px", height: "8px", background: "#1e293b" }} />
                    <div style={{ background: "#ffffff", border: "1px solid #e2e8f0", borderRadius: "6px", padding: "6px 12px", textAlign: "center" }}>
                      <div style={{ fontSize: "11px", color: "#64748b" }}>{sub.name}</div>
                      <div style={{ fontSize: "9px", color: "#64748b", fontFamily: mono }}>{sub.role}</div>
                    </div>
                  </div>
                ) : null;
              })}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Data Tab ──────────────────────────────────────────────────────
function DataTab() {
  const groups = [
    { name: "Reference", color: "#64748b", tables: [["currencies", 60], ["countries", 65], ["regions", 14], ["locations", 2], ["project_types", 5]] },
    { name: "Organisation", color: "#e11d48", tables: [["companies", 1], ["users", 6], ["roles", 6], ["org_units", 5], ["employments", 6], ["exec_portfolios", 2], ["stakeholders", 5]] },
    { name: "Strategy", color: "#3b82f6", tables: [["synthesis", 1], ["nine_decisions", 9], ["strategy", 1], ["golden_threads", 4], ["swot", 1], ["business_model", 1], ["values", 4], ["habits", 3]] },
    { name: "Execution", color: "#22c55e", tables: [["objectives", 5], ["projects", 5], ["actions", 8], ["strategic_plans", 4], ["plan_templates", 5], ["kpis", 5], ["budgets", 5], ["gccs", 3], ["risk_register", 4], ["rasci", 5], ["reviews", 5]] },
  ];
  const total = groups.reduce((s, g) => s + g.tables.reduce((a, t) => a + t[1], 0), 0);

  return (
    <div style={{ maxWidth: "860px", margin: "0 auto", padding: "32px 40px" }}>
      <div style={{ fontSize: "9px", color: "#64748b", textTransform: "uppercase", letterSpacing: "0.12em", fontFamily: mono, marginBottom: "6px" }}>Data Architecture</div>
      <h2 style={{ fontSize: "28px", fontWeight: 300, color: "#0f172a", margin: "0 0 4px", fontFamily: sans }}>31 tables · {total} records</h2>
      <p style={{ fontSize: "12px", color: "#64748b", fontFamily: mono, margin: "0 0 24px" }}>catalyst schema · Newton Day Genesis · all sample_data = true</p>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: "12px" }}>
        {groups.map((g, i) => (
          <div key={i}>
            <div style={{ fontSize: "10px", color: g.color, textTransform: "uppercase", letterSpacing: "0.1em", fontFamily: mono, marginBottom: "8px", fontWeight: 700 }}>{g.name}</div>
            {g.tables.map((t, j) => (
              <div key={j} style={{ display: "flex", justifyContent: "space-between", padding: "4px 8px", marginBottom: "2px", background: "#ffffff", borderLeft: `2px solid ${g.color}30`, borderRadius: "2px" }}>
                <span style={{ fontSize: "11px", color: "#64748b", fontFamily: mono }}>od_{t[0]}</span>
                <span style={{ fontSize: "10px", color: g.color, fontFamily: mono, fontWeight: 700 }}>{t[1]}</span>
              </div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("graph");
  const [selected, setSelected] = useState(null);
  const tabs = [
    { key: "graph", label: "Strategic Map" },
    { key: "dashboard", label: "Dashboard" },
    { key: "org", label: "Organisation" },
    { key: "data", label: "Data" },
  ];

  return (
    <div onClick={() => setSelected(null)} style={{ background: "#f8fafc", minHeight: "100vh", fontFamily: sans, color: "#1e293b" }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

      {/* Top bar */}
      <div style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 100, background: "#f8facce0", backdropFilter: "blur(12px)", borderBottom: "1px solid #1e293b20" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 32px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
            <div style={{ width: "22px", height: "22px", borderRadius: "4px", background: "linear-gradient(135deg, #3b82f6, #8b5cf6)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "11px", fontWeight: 800, color: "white" }}>C</div>
            <span style={{ fontSize: "12px", fontWeight: 600, color: "#64748b", letterSpacing: "0.06em", fontFamily: mono }}>CATALYST DMS</span>
            <span style={{ fontSize: "11px", color: "#1e293b", margin: "0 4px" }}>·</span>
            <span style={{ fontSize: "11px", color: "#64748b" }}>Meridian Dynamics</span>
          </div>
          <div style={{ display: "flex", gap: "2px" }}>
            {tabs.map(t => (
              <button key={t.key} onClick={(e) => { e.stopPropagation(); setTab(t.key); setSelected(null); }} style={{
                background: tab === t.key ? "#1e293b" : "transparent",
                border: "none", cursor: "pointer", padding: "6px 14px", borderRadius: "4px",
                fontSize: "11px", fontWeight: 600, color: tab === t.key ? "#f1f5f9" : "#475569",
                fontFamily: mono, transition: "all 0.2s",
              }}>{t.label}</button>
            ))}
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{ paddingTop: "56px" }}>
        {tab === "graph" && <GraphView selected={selected} setSelected={setSelected} />}
        {tab === "dashboard" && <DashboardTab />}
        {tab === "org" && <OrgTab />}
        {tab === "data" && <DataTab />}
      </div>

      {/* Side panel */}
      {tab === "graph" && selected && (
        <>
          <div onClick={() => setSelected(null)} style={{ position: "fixed", inset: 0, background: "#00000015", zIndex: 150 }} />
          <AnalysisPanel nodeId={selected} onClose={() => setSelected(null)} />
        </>
      )}

      {/* Footer hint for graph */}
      {tab === "graph" && (
        <div style={{ position: "fixed", bottom: "20px", left: "50%", transform: "translateX(-50%)", fontSize: "10px", color: "#1e293b", background: "#ffffff", border: "1px solid #1e293b30", borderRadius: "4px", padding: "5px 14px", zIndex: 100, fontFamily: mono }}>
          click any node to explore · hover to trace connections
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
